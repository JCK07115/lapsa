<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Möbius Strip Demo (White)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #444;
            font-family: sans-serif;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Möbius Strip</div>

    <script type="module">
        import * as THREE from 'three';
        import { ParametricGeometry } from 'three/addons/geometries/ParametricGeometry.js';

        // 1. SCENE
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.04);

        // 2. CAMERA
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 12);

        // 3. RENDERER
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 4. GEOMETRY MATH
        const moebiusFunction = (u, v, target) => {
            u = u * Math.PI * 2; 
            v = v * 2 - 1;       
            
            const R = 3.5; 
            const w = 0.8; 

            const x = (R + w * v * Math.cos(u / 2)) * Math.cos(u);
            const z = (R + w * v * Math.cos(u / 2)) * Math.sin(u); 
            const y = w * v * Math.sin(u / 2); 

            target.set(x, y, z);
        };

        const geometry = new ParametricGeometry(moebiusFunction, 120, 20);

        // 5. MATERIALS
        
        // MAIN BODY: Pure White
        const material = new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff,        // White
            roughness: 0.2,         // Smooth
            metalness: 0.1,         // Slight metallic reflection
            clearcoat: 0.5,         // Glossy coating
            clearcoatRoughness: 0.1,
            side: THREE.DoubleSide,
        });

        // WIREFRAME: Dark Grey (to contrast against white body)
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x222222,        // Dark Grey/Black
            wireframe: true,
            transparent: true,
            opacity: 0.08           // Very subtle
        });

        // 6. MESH & GROUP
        const moebiusMesh = new THREE.Mesh(geometry, material);
        const wireframeMesh = new THREE.Mesh(geometry, wireframeMaterial);
        
        const group = new THREE.Group();
        group.add(moebiusMesh);
        group.add(wireframeMesh);
        scene.add(group);

        // 7. ORIENTATION & SCALE
        group.scale.set(0.7, 0.7, 0.7);            // Scaled down 30%
        group.rotation.x = THREE.MathUtils.degToRad(12); // Low tilt

        // 8. LIGHTING
        // Increased ambient light slightly so the white doesn't look grey in shadows
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        
        const rimLight = new THREE.DirectionalLight(0xccffff, 2); // Cool blue rim light
        rimLight.position.set(-5, 0, -5);
        scene.add(rimLight);

        // 9. ANIMATION
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
