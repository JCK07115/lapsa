<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Möbius Alphabet – Parametric Indented Torus</title>
    <style>
        body { 
            margin: 0; 
            background-color: #1a1a1a; 
            height: 250vh;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas { 
            display: block; 
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #alphabet-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        #alphabet-container.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .letter-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .letter-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            width: 40px;
            height: 40px;
            line-height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .letter-link:hover {
            background: white;
            color: #1a1a1a;
            transform: scale(1.2);
        }

        #scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="scroll-hint">SCROLL DOWN TO EXPLORE</div>

    <div id="alphabet-container">
        <div class="letter-grid" id="grid-target"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ParametricGeometry } from 'three/addons/geometries/ParametricGeometry.js';

        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.04);

        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            100
        );
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. ALPHABET LINKS ---
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const gridTarget = document.getElementById("grid-target");
        letters.forEach(char => {
            const a = document.createElement('a');
            a.href = "#";
            a.className = "letter-link";
            a.innerText = char;
            gridTarget.appendChild(a);
        });

        // --- 3. GEOMETRY – torus with vertical indents (Parametric) ---
        const indentedTorusFunction = (u, v, target) => {
            u = u * Math.PI * 2; 
            v = v * Math.PI * 2; 
            
            const R = 3.8;      // main radius
            const r = 0.55;     // tube radius
            const indent = 0.8; // how deep to pull two opposite sides down

            // Basic torus geometry
            const cosu = Math.cos(u);
            const sinu = Math.sin(u);
            const cosv = Math.cos(v);
            const sinv = Math.sin(v);

            let x = (R + r * cosv) * cosu;
            let z = (R + r * cosv) * sinu;

            // Vertical position: base circle around the tube
            let y = r * sinv;

            // Add vertical dips at u = 0, π (two opposite points)
            const dip = (1 - Math.cos(2 * u)) * 0.5; // 0 → 1 → 0 twice around loop
            y -= indent * dip;

            target.set(x, y, z);
        };

        const geometry = new ParametricGeometry(indentedTorusFunction, 100, 28);

        // --- 4. MATERIAL – white wireframe only ---
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.9
        });

        const torusMesh = new THREE.Mesh(geometry, wireframeMaterial);
        
        const group = new THREE.Group();
        group.add(torusMesh);
        
        // Lights kept but have no effect on MeshBasic (harmless)
        const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
        mainLight.position.set(5, 10, 7); 
        group.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
        fillLight.position.set(-5, -5, -5); 
        group.add(fillLight);

        scene.add(group);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // --- 5. ORIENTATION ---
        group.scale.set(0.7, 0.7, 0.7);
        const BASE_TILT_X = THREE.MathUtils.degToRad(20);
        group.rotation.x = BASE_TILT_X; // fixed tilt, no scroll-driven change

        // --- 6. SCROLL: only toggles alphabet visibility / hint ---
        const alphabetContainer = document.getElementById('alphabet-container');
        const scrollHint = document.getElementById('scroll-hint');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const viewportHeight = window.innerHeight;
            const progress = Math.min(scrollY / viewportHeight, 1);

            if (progress > 0.85) {
                alphabetContainer.classList.add('visible');
                scrollHint.style.opacity = '0';
            } else {
                alphabetContainer.classList.remove('visible');
                scrollHint.style.opacity = '1';
            }
        });

        // --- 7. RESPONSIVENESS ---
        function adjustCameraDistance() {
            const aspect = window.innerWidth / window.innerHeight;
            const baseDistance = 12; 
            if (aspect < 1) {
                camera.position.set(0, 0, baseDistance / aspect);
            } else {
                camera.position.set(0, 0, baseDistance);
            }
        }
        adjustCameraDistance();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustCameraDistance();
        });

        // --- 8. ANIMATION LOOP – rotate only about Y ---
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005; 
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
