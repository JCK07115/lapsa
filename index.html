<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAPSA</title>

  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/index.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="scroll-hint">
    WELCOME TO LAPSA
    <br />
    SCROLL DOWN TO EXPLORE
  </div>

  <div id="torus-glow"></div>

  <!-- LETTER-RAIL MODE -->
  <nav id="alphabet-rail" aria-label="Alphabet navigation"></nav>

  <!-- LETTER-SELECTION MODE -->
  
  <div id="alphabet-rail"></div>
  <div id="selected-letter-overlay" aria-hidden="true"></div>
  <div id="word-carousel" aria-hidden="true"></div>

  <!-- select instruction and custom mouse overlay -->
  <div id="select-instruction">click anywhere and hold to select</div>
  <div id="hold-cursor" aria-hidden="true">
    <div id="hold-cursor-fill"></div>
  </div>

  <button id="letter-back-button" type="button" aria-label="Back">Back</button>
  <div id="page-transition-veil"></div>

  <script type="module" src="scripts/main.js"></script>
</body>
</html>
