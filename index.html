<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torus Wireframe Demo</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000000; 
        }
        canvas { 
            display: block; 
        }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #666;
            font-family: sans-serif;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Torus</div>

    <script type="module">
        import * as THREE from 'three';

        // 1. SCENE
        const scene = new THREE.Scene();
        // Optional: very light fog to soften far lines
        scene.fog = new THREE.FogExp2(0x000000, 0.06);

        // 2. CAMERA
        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            100
        );
        camera.position.set(0, 0, 12);

        // 3. RENDERER
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 4. GEOMETRY – classic torus, with sparse segments
        const radius = 3.5;          // main radius
        const tubeRadius = 1.0;      // thickness of torus tube
        const radialSegments = 18;   // segments around main circle (lower = sparser)
        const tubularSegments = 48;  // segments around tube (lower = sparser)

        const geometry = new THREE.TorusGeometry(
            radius,
            tubeRadius,
            radialSegments,
            tubularSegments
        );

        // 5. MATERIAL – pure wireframe, no solid fill
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.85
        });

        const torusMesh = new THREE.Mesh(geometry, wireframeMaterial);

        // 6. GROUP (for easier transforms)
        const group = new THREE.Group();
        group.add(torusMesh);
        scene.add(group);

        // 7. ORIENTATION & SCALE
        group.scale.set(0.85, 0.85, 0.85);

        // Start with a tilt so silhouette changes as it spins
        group.rotation.x = THREE.MathUtils.degToRad(60);
        group.rotation.z = THREE.MathUtils.degToRad(15);

        // 8. ANIMATION
        function animate() {
            requestAnimationFrame(animate);

            // Slow continuous turntable
            group.rotation.y += 0.008;
            // Subtle secondary motion for more interesting silhouettes
            group.rotation.x += 0.0015;

            renderer.render(scene, camera);
        }

        // 9. RESIZE HANDLER
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        animate();
    </script>
</body>
</html>
