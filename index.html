<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Möbius Demo</title>
    <style>
        /* 
           Background set to a dark charcoal (#1a1a1a). 
           Change this hex code to match your site theme.
        */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
        }
        canvas { 
            display: block; 
        }
    </style>
    
    <!-- Load Three.js from CDN (No install required) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { ParametricGeometry } from 'three/addons/geometries/ParametricGeometry.js';

        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        // Soft fog to blend the object into the background
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.04);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. THE GEOMETRY MATH ---
        const moebiusVolumeFunction = (u, v, target) => {
            // u: angle around the main loop (0..2PI)
            // v: angle around the cross-section (0..2PI)
            u = u * Math.PI * 2; 
            v = v * Math.PI * 2; 
            
            const R = 3.5;         // Main Radius
            const width = 0.6;     // Strip Width
            const thickness = 0.2; // Strip Thickness (Volume)

            // 1. Define Cross-Section (Ellipse)
            let localX = width * Math.cos(v);
            let localY = thickness * Math.sin(v);

            // 2. Apply Twist (u/2)
            const twistAngle = u / 2;
            let twistedX = localX * Math.cos(twistAngle) - localY * Math.sin(twistAngle);
            let twistedY = localX * Math.sin(twistAngle) + localY * Math.cos(twistAngle);

            // 3. Map to Torus
            const finalX = (R + twistedX) * Math.cos(u);
            const finalZ = (R + twistedX) * Math.sin(u);
            const finalY = twistedY;

            target.set(finalX, finalY, finalZ);
        };

        // Segments: 140 (Lengthwise), 40 (Cross-section)
        const geometry = new ParametricGeometry(moebiusVolumeFunction, 140, 40);

        // --- 3. MATERIALS ---
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,        
            roughness: 0.9,         // Matte finish
            metalness: 0.1,         
            flatShading: false,
        });

        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x111111,        // Dark Grey Lines
            wireframe: true,
            transparent: true,
            opacity: 0.08           // Subtle opacity
        });

        // --- 4. SCENE GRAPH ---
        const moebiusMesh = new THREE.Mesh(geometry, material);
        const wireframeMesh = new THREE.Mesh(geometry, wireframeMaterial);
        
        const group = new THREE.Group();
        group.add(moebiusMesh);
        group.add(wireframeMesh);
        
        // --- 5. LIGHTING ---
        // Lights attached to group so shadows don't "move" as it spins
        const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
        mainLight.position.set(5, 10, 7); 
        group.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
        fillLight.position.set(-5, -5, -5); 
        group.add(fillLight);

        scene.add(group);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // --- 6. ORIENTATION ---
        group.scale.set(0.7, 0.7, 0.7);
        group.rotation.x = THREE.MathUtils.degToRad(12); 

        // --- 7. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005; // Slow spin
            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
