<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Möbius Alphabet – Flowing Indented Torus</title>
    <style>
        body { 
            margin: 0; 
            background-color: #1a1a1a; 
            height: 250vh;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas { 
            display: block; 
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #alphabet-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        #alphabet-container.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .letter-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .letter-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            width: 40px;
            height: 40px;
            line-height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .letter-link:hover {
            background: white;
            color: #1a1a1a;
            transform: scale(1.2);
        }

        #scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="scroll-hint">SCROLL DOWN TO EXPLORE</div>

    <div id="alphabet-container">
        <div class="letter-grid" id="grid-target"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ParametricGeometry } from 'three/addons/geometries/ParametricGeometry.js';

        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.04);

        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            100
        );
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. ALPHABET LINKS ---
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const gridTarget = document.getElementById("grid-target");
        letters.forEach(char => {
            const a = document.createElement('a');
            a.href = "#";
            a.className = "letter-link";
            a.innerText = char;
            gridTarget.appendChild(a);
        });

        // --- 3. GEOMETRY – indented torus with animated cross-section phase ---
        const SEG_U = 72;
        const SEG_V = 18;

        const R = 3.8;       // main radius
        const r = 0.55;      // tube radius
        const INDENT = 1.1;  // depth of the two dips

        // Compute a single point on the indented torus, with a phase applied to v
        function indentedTorusPoint(u, v, phase, target) {
            // u, v in [0,1]
            const TWO_PI = Math.PI * 2;
            const up = u * TWO_PI;
            const vp = (v + phase) * TWO_PI; // phase only affects cross-section

            const cosu = Math.cos(up),  sinu = Math.sin(up);
            const cosv = Math.cos(vp),  sinv = Math.sin(vp);

            let x = (R + r * cosv) * cosu;
            let z = (R + r * cosv) * sinu;
            let y = r * sinv;

            // Vertical dips at u = 0, π (two opposite points)
            const dip = (1 - Math.cos(2 * up)) * 0.5; // 0 → 1 → 0 twice around loop
            y -= INDENT * dip;

            target.set(x, y, z);
        }

        // Initial geometry (phase = 0)
        const geometry = new ParametricGeometry(
            (u, v, target) => indentedTorusPoint(u, v, 0.0, target),
            SEG_U,
            SEG_V
        );

        // --- 4. MATERIAL – white wireframe only ---
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.9
        });

        const torusMesh = new THREE.Mesh(geometry, wireframeMaterial);
        
        const group = new THREE.Group();
        group.add(torusMesh);
        
        // Lights kept but have no effect on MeshBasic
        const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
        mainLight.position.set(5, 10, 7); 
        group.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
        fillLight.position.set(-5, -5, -5); 
        group.add(fillLight);

        scene.add(group);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // --- 5. ORIENTATION – lock an ∞ silhouette using only Y rotation ---
        group.scale.set(0.7, 0.7, 0.7);

        // Try ~35° about Y; adjust to taste (e.g. 30–45)
        group.rotation.x = THREE.MathUtils.degToRad(0);
        group.rotation.y = THREE.MathUtils.degToRad(40);
        group.rotation.z = THREE.MathUtils.degToRad(1);

        // --- 6. SCROLL: only UI visibility ---
        const alphabetContainer = document.getElementById('alphabet-container');
        const scrollHint = document.getElementById('scroll-hint');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const viewportHeight = window.innerHeight;
            const progress = Math.min(scrollY / viewportHeight, 1);

            if (progress > 0.85) {
                alphabetContainer.classList.add('visible');
                scrollHint.style.opacity = '0';
            } else {
                alphabetContainer.classList.remove('visible');
                scrollHint.style.opacity = '1';
            }
        });

        // --- 7. RESPONSIVENESS ---
        function adjustCameraDistance() {
            const aspect = window.innerWidth / window.innerHeight;
            const baseDistance = 12; 
            if (aspect < 1) {
                camera.position.set(0, 0, baseDistance / aspect);
            } else {
                camera.position.set(0, 0, baseDistance);
            }
        }
        adjustCameraDistance();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustCameraDistance();
        });

        // --- 8. FLOW ANIMATION ALONG THE TORUS (no global rotation) ---
        const positionAttr = geometry.attributes.position;
        const tmp = new THREE.Vector3();
        let phase = 0;

        function updateFlow(phase) {
            let index = 0;
            for (let i = 0; i <= SEG_U; i++) {
                const u = i / SEG_U;
                for (let j = 0; j <= SEG_V; j++) {
                    const v = j / SEG_V;
                    indentedTorusPoint(u, v, phase, tmp);
                    positionAttr.array[index * 3 + 0] = tmp.x;
                    positionAttr.array[index * 3 + 1] = tmp.y;
                    positionAttr.array[index * 3 + 2] = tmp.z;
                    index++;
                }
            }
            positionAttr.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Advance phase for "flow" around the tube
            phase = (phase + 0.003) % 1.0;
            updateFlow(phase);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
