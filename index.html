<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure-Eight Torus</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #666;
            font-family: sans-serif;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Figure-Eight Torus</div>

    <script type="module">
        import * as THREE from 'three';

        // Custom centerline curve: a planar figure-eight (∞)
        class FigureEightCurve extends THREE.Curve {
            constructor(scale = 1) {
                super();
                this.scale = scale;
            }

            getPoint(t, target = new THREE.Vector3()) {
                const a = t * Math.PI * 2;

                // Simple figure-eight / Lissajous-like curve
                const x = Math.sin(a);
                const y = 0.5 * Math.sin(2 * a); // adjust 0.5 to stretch/compress vertically
                const z = 0;

                return target.set(x, y, z).multiplyScalar(this.scale);
            }
        }

        // 1. SCENE
        const scene = new THREE.Scene();

        // 2. CAMERA
        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            100
        );
        camera.position.set(0, 0, 12);

        // 3. RENDERER
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 4. GEOMETRY – tube around the figure-eight curve
        const curve = new FigureEightCurve(3.0); // overall size
        const pathSegments   = 120;  // along the curve (lower = more open)
        const tubeRadius     = 0.4;  // thickness of the tube
        const radialSegments = 10;   // around the tube (lower = more open)

        const geometry = new THREE.TubeGeometry(
            curve,
            pathSegments,
            tubeRadius,
            radialSegments,
            true // closed loop
        );

        // 5. MATERIAL – pure white wireframe, background visible through gaps
        const material = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.9
        });

        const mesh = new THREE.Mesh(geometry, material);

        // 6. GROUP
        const group = new THREE.Group();
        group.add(mesh);
        scene.add(group);

        // 7. ORIENTATION – start roughly like the sample (tilted ∞)
        group.scale.set(0.95, 0.95, 0.95);
        group.rotation.x = THREE.MathUtils.degToRad(38);
        group.rotation.z = THREE.MathUtils.degToRad(20);

        // 8. ANIMATION – slow spin so silhouette shifts (∞ → U, etc.)
        function animate() {
            requestAnimationFrame(animate);

            group.rotation.y += 0.008;   // main turntable
            group.rotation.x += 0.0015;  // slight extra wobble

            renderer.render(scene, camera);
        }

        // 9. RESIZE
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        animate();
    </script>
</body>
</html>
