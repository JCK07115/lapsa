iter/3/paratorus.html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Möbius Alphabet – Parametric Indented Ring</title>
    <style>
        body { 
            margin: 0; 
            background-color: #1a1a1a; 
            height: 250vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { 
            display: block; 
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
        #alphabet-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        #alphabet-container.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .letter-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .letter-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            width: 40px;
            height: 40px;
            line-height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: all 0.3s;
        }
        .letter-link:hover {
            background: white;
            color: #1a1a1a;
            transform: scale(1.2);
        }
        #scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="scroll-hint">SCROLL DOWN TO EXPLORE</div>

    <div id="alphabet-container">
        <div class="letter-grid" id="grid-target"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ParametricGeometry } from 'three/addons/geometries/ParametricGeometry.js';

        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.04);

        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            100
        );
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. ALPHABET LINKS ---
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const gridTarget = document.getElementById("grid-target");
        letters.forEach(char => {
            const a = document.createElement('a');
            a.href = "#";
            a.className = "letter-link";
            a.innerText = char;
            gridTarget.appendChild(a);
        });

        // --- 3. GEOMETRY – indented torus via ParametricGeometry ---
        const indentedRingFunction = (u, v, target) => {
            u = u * Math.PI * 2; 
            v = v * Math.PI * 2; 
            
            const R0 = 3.6;          // base radius of ring
            const indent = -0.7;     // negative => inward dents at two opposite points
            const R = R0 + indent * Math.cos(2 * u); // 2 dents around loop

            const r = 0.55;          // tube radius (thickness)

            const x = (R + r * Math.cos(v)) * Math.cos(u);
            const z = (R + r * Math.cos(v)) * Math.sin(u);
            const y = r * Math.sin(v);

            target.set(x, y, z);
        };

        const geometry = new ParametricGeometry(indentedRingFunction, 100, 28);

        // --- 4. MATERIAL – wireframe only ---
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.9
        });

        const ringMesh = new THREE.Mesh(geometry, wireframeMaterial);
        
        const group = new THREE.Group();
        group.add(ringMesh);
        
        // --- 5. LIGHTING (kept, but MeshBasic doesn't use it – harmless) ---
        const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
        mainLight.position.set(5, 10, 7); 
        group.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
        fillLight.position.set(-5, -5, -5); 
        group.add(fillLight);

        scene.add(group);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // --- 6. INITIAL ORIENTATION ---
        group.scale.set(0.7, 0.7, 0.7);
        const START_ANGLE = THREE.MathUtils.degToRad(12);
        const END_ANGLE   = THREE.MathUtils.degToRad(90);
        group.rotation.x = START_ANGLE; 

        // --- 7. SCROLL INTERACTION ---
        const alphabetContainer = document.getElementById('alphabet-container');
        const scrollHint = document.getElementById('scroll-hint');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const viewportHeight = window.innerHeight;
            let progress = Math.min(scrollY / viewportHeight, 1);

            group.rotation.x = START_ANGLE + (END_ANGLE - START_ANGLE) * progress;

            if (progress > 0.85) {
                alphabetContainer.classList.add('visible');
                scrollHint.style.opacity = '0';
            } else {
                alphabetContainer.classList.remove('visible');
                scrollHint.style.opacity = '1';
            }
        });

        // --- 8. RESPONSIVENESS ---
        function adjustCameraDistance() {
            const aspect = window.innerWidth / window.innerHeight;
            const baseDistance = 12; 
            if (aspect < 1) {
                camera.position.set(0, 0, baseDistance / aspect);
            } else {
                camera.position.set(0, 0, baseDistance);
            }
        }
        adjustCameraDistance();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustCameraDistance();
        });

        // --- 9. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005; 
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
