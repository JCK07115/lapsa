<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Möbius Tube Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #444;
            font-family: sans-serif;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Möbius Tube</div>

    <script type="module">
        import * as THREE from 'three';
        import { ParametricGeometry } from 'three/addons/geometries/ParametricGeometry.js';

        // 1. SCENE
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.04);

        // 2. CAMERA
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 12);

        // 3. RENDERER
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 4. GEOMETRY MATH (Volumetric Tube)
        // u = angle around the main ring (0..2PI)
        // v = angle around the tube cross-section (0..2PI)
        const moebiusTubeFunction = (u, v, target) => {
            u = u * Math.PI * 2; 
            v = v * Math.PI * 2; 
            
            const R = 3.5;  // Radius of the main loop
            const r = 0.45; // Radius of the tube (Reduced width/thickness)

            // The "Twist": We add u/2 to the v angle.
            // As we go around the main loop (u), the tube rotates 180 degrees (u/2).
            const weirdness = t => t; // Identity function for standard circular cross section

            const x = (R + r * Math.cos(v + u / 2)) * Math.cos(u);
            const z = (R + r * Math.cos(v + u / 2)) * Math.sin(u);
            const y = r * Math.sin(v + u / 2);

            target.set(x, y, z);
        };

        // Increased segments for smoothness
        const geometry = new ParametricGeometry(moebiusTubeFunction, 120, 40);

        // 5. MATERIALS
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,        
            roughness: 1.0,         // Fully Matte (No shine)
            metalness: 0.0,         
            flatShading: false,
        });

        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x111111,        // Very dark grey
            wireframe: true,
            transparent: true,
            opacity: 0.08           
        });

        // 6. MESH & GROUP
        const moebiusMesh = new THREE.Mesh(geometry, material);
        const wireframeMesh = new THREE.Mesh(geometry, wireframeMaterial);
        
        const group = new THREE.Group();
        group.add(moebiusMesh);
        group.add(wireframeMesh);
        
        // 7. LIGHTING (Attached to GROUP, not SCENE)
        // By adding the light to the group, the light rotates WITH the object.
        // This eliminates the "moving highlight" effect.
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 2.0);
        mainLight.position.set(5, 10, 7); // Fixed relative to the object
        group.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
        fillLight.position.set(-5, -5, -5); 
        group.add(fillLight);

        scene.add(group);

        // Ambient light for general brightness (This stays in scene)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        // 8. ORIENTATION & SCALE
        group.scale.set(0.7, 0.7, 0.7);      
        group.rotation.x = THREE.MathUtils.degToRad(12); 

        // 9. ANIMATION
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
